project_name: surf
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/surf
    binary: surf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^style:"
      - "^test:"

blobs:
  - provider: s3
    bucket: "{{ .Env.RELEASE_BUCKET }}"
    region: "{{ .Env.AWS_REGION }}"
    directory: "{{ .Env.RELEASE_DIRECTORY }}/{{ .Tag }}"

release:
  disable: true
