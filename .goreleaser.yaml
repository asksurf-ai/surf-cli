project_name: surf
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/surf
    binary: surf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^style:"
      - "^test:"

blobs:
  - provider: s3
    bucket: surf-cli-releases
    region: us-west-2
    directory: "cli/releases/{{.Tag}}"

release:
  github:
    owner: cyberconnecthq
    name: surf-cli
  draft: false
  prerelease: auto
