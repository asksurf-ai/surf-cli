name: Update & Publish SDK

on:
  repository_dispatch:
    types: [hermod-release]
  workflow_dispatch:
    inputs:
      spec_url:
        description: 'OpenAPI spec URL (default: live endpoint)'
        required: false
        default: 'https://api.ask.surf/gateway/openapi.json'
      version:
        description: 'Override SDK version (default: read from spec info.version)'
        required: false
      skip_publish:
        description: 'Skip npm publish (only regenerate and commit)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Determine spec URL
        id: spec
        run: |
          URL="${{ github.event.client_payload.spec_url || inputs.spec_url || 'https://api.ask.surf/gateway/openapi.json' }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download spec
        run: curl -fsSL "${{ steps.spec.outputs.url }}" -o /tmp/openapi.json

      - name: Regenerate SDK
        working-directory: js/packages/sdk
        run: python3 scripts/gen_sdk.py --spec /tmp/openapi.json

      - name: Stamp package versions
        id: version
        run: |
          OVERRIDE="${{ inputs.version }}"
          if [ -n "$OVERRIDE" ]; then
            VER="$OVERRIDE"
          else
            VER=$(python3 -c "
          import json
          spec = json.load(open('/tmp/openapi.json'))
          print(spec['info']['version'].lstrip('v'))
          ")
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "SDK version: $VER"
          for pkg in js/packages/sdk js/packages/theme; do
            jq --arg v "$VER" '.version = $v' "$pkg/package.json" > tmp && mv tmp "$pkg/package.json"
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit to main
        if: steps.diff.outputs.changed == 'true'
        run: |
          TAG="${{ github.event.client_payload.tag || 'manual' }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/
          git commit -m "chore: regenerate SDK for hermod ${TAG}

          - Updated types, hooks, and dataApi from OpenAPI spec
          - Bumped package versions to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Publish @surf-ai/theme
        if: steps.diff.outputs.changed == 'true' && inputs.skip_publish != 'true'
        working-directory: js/packages/theme
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @surf-ai/sdk
        if: steps.diff.outputs.changed == 'true' && inputs.skip_publish != 'true'
        working-directory: js/packages/sdk
        run: npm install && npm run build && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

