name: Publish create-surf-app

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.2). Leave empty to use package.json version.'
        required: false
      tag:
        description: 'npm dist-tag (default: latest)'
        required: false
        default: 'latest'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js/packages/create-surf-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Stamp version (if override provided)
        if: inputs.version != ''
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' package.json > tmp && mv tmp package.json
          echo "Version set to ${{ inputs.version }}"

      - name: Read version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm install && npm run build

      - name: Publish
        run: npm publish --access public --tag ${{ inputs.tag || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump (if overridden)
        if: inputs.version != ''
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/packages/create-surf-app/package.json
          git diff --cached --quiet || git commit -m "chore: bump create-surf-app to ${{ steps.pkg.outputs.version }}" && git push origin main

      - name: Summary
        run: echo "Published create-surf-app@${{ steps.pkg.outputs.version }} with tag ${{ inputs.tag || 'latest' }}" >> "$GITHUB_STEP_SUMMARY"
